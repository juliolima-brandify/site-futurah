name = "tracker-worker"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Routes — CNAMEs proxied criados em 2026-04-29 nas zonas futurah.co e augustofelipe.com.
[[routes]]
pattern = "t.futurah.co/*"
zone_name = "futurah.co"

[[routes]]
pattern = "t.augustofelipe.com/*"
zone_name = "augustofelipe.com"

# Analytics Engine: dataset rígido (blobs/doubles/indexes).
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "tracker_events"

# KV: config (allowlist sites, allowlist origins, salt rotativo de IP).
# TODO(kv): rodar `wrangler kv namespace create tracker-config` e colar o id aqui.
[[kv_namespaces]]
binding = "KV"
id = "700f6793abf0433ba99601af785cd2d7"
preview_id = "297465141ea34455a2dda7dc57f07904"

# D1: removido em 2026-05-05. A tabela `leads` foi dropada (migration
# 0002_drop_leads.sql) e a captura de leads agora vai pra Payload via
# /api/leads/ingest no site-futurah. Migrations antigas mantidas em
# packages/tracker-worker/migrations/ apenas como histórico.

# Vars não-secretas. Account ID precisa ser visível pra fazer query no AE SQL API.
# TODO(account): substituir pelo Account ID da CF (Dashboard → conta).
[vars]
CF_ACCOUNT_ID = "c43e22dbbaa289eade42d31408d0e3b4"
AE_DATASET = "tracker_events"

# Secrets gerenciados via `wrangler secret put`:
#   API_READ_TOKEN     — bearer token consumido por GET /api/*
#   CF_API_TOKEN_AE    — token CF com permissão "Account Analytics: Read" para SQL API
#
# Cron de rotação de salt do hash de IP (Workers Paid).
# TODO(cron): habilitar após upgrade pra plano paid.
# [triggers]
# crons = ["0 0 * * *"]
