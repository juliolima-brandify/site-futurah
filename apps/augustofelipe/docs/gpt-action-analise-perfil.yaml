# OpenAPI schema da Action "Análise de Perfil" do Custom GPT (bônus grátis).
# Cole no builder: Configure -> Actions -> Create new action -> Schema.
#
# Authentication: API Key -> Bearer -> valor da ANALISE_API_KEY.
# Privacy policy: URL da política de privacidade do site.
# Troque servers.url se o domínio/preview mudar.
#
# Nota: a `description` de cada operação tem limite de 300 caracteres no builder.
# Por isso ela é curta aqui — a lógica detalhada (allowed:false, modo manual etc.)
# fica nas Instructions do GPT, não no schema.

openapi: 3.1.0
info:
  title: Análise de Perfil — Construindo um Viral
  description: Dados do perfil do Instagram para o diagnóstico.
  version: 1.0.0
servers:
  - url: https://augustofelipe.com
paths:
  /api/analise-perfil:
    get:
      operationId: analisarPerfil
      summary: Busca dados do perfil do Instagram
      description: Recebe o @ e o email do aluno e retorna os dados do perfil (bio, seguidores, posts) e os últimos posts (legenda, views). Use os números reais. Se vier allowed=false, o aluno já usou a análise gratuita.
      parameters:
        - name: handle
          in: query
          required: true
          description: O @ do Instagram do aluno (com @, sem @ ou como URL).
          schema:
            type: string
        - name: email
          in: query
          required: true
          description: Email do cadastro do aluno. Libera 1 análise por aluno.
          schema:
            type: string
      responses:
        "200":
          description: Dados do perfil
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  allowed:
                    type: boolean
                  reason:
                    type: string
                    nullable: true
                  fetchedFor:
                    type: string
                  profile:
                    type: object
                    properties:
                      username: { type: string }
                      fullName: { type: string }
                      biography: { type: string }
                      followers: { type: integer }
                      following: { type: integer }
                      posts: { type: integer }
                      verified: { type: boolean }
                      private: { type: boolean }
                      category: { type: string }
                      externalUrl: { type: string }
                  posts:
                    type: array
                    items:
                      type: object
                      properties:
                        kind: { type: string }
                        caption: { type: string }
                        likes: { type: integer }
                        comments: { type: integer }
                        views: { type: integer }
                        durationSec: { type: number }
                        timestamp: { type: string }
                        url: { type: string }
                  postsAvailable:
                    type: integer
                  notes:
                    type: string
                    nullable: true
        "400":
          description: Handle ou email inválido
        "401":
          description: Não autorizado
        "404":
          description: Perfil não encontrado, privado, ou scrape falhou
        "429":
          description: Limite de requisições atingido
